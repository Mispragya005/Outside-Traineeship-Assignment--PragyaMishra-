
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div id="box" style="margin-top: 1000px; padding: 40px;">
  I appear when scrolled into view!
</div>

<script>
  const box = document.getElementById('box');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // Element is visible in the viewport
        box.style.opacity = '1';
        box.style.transition = 'opacity 1s';
        console.log('Box is visible!');
      } else {
        // Element is out of viewport
        box.style.opacity = '0';
        console.log('Box is hidden!');
      }
    });
  }, {
    root: null,  // default: null (uses the browser viewport)
    rootMargin: '0px',  // default: '0px' (no expansion or shrinking)
    threshold: 0   // default: 0 (triggers as soon as 1px is visible)
  });

  // Start observing the box
  observer.observe(box);
</script>
