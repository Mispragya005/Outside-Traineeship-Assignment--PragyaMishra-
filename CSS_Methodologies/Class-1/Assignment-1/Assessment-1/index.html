<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="code/style.css">
    <title>Assessment 13</title>
</head>
<body>
    <div class="profile-card">
        <div class="profile-card__info">
            <img class="profile-card__avatar" src="image.png" alt="photo">
            <h3 class="profile-card__name">Jessica Potter</h3>
            <p class="profile-card__profession">Visual Artist</p>
            <button class="btn btn--follow">Follow</button>
            <button class="btn btn--message">Message</button>
        </div>

        <div class="stat-panel">
            <div class="stat-block stat-block--divided">
                <p class="stat-block__value">523</p>
                <p class="stat-block__label">Posts</p>
            </div>
            <div class="stat-block stat-block--divided">
                <p class="stat-block__value">1387</p>
                <p class="stat-block__label">Likes</p>
            </div>
            <div class="stat-block">
                <p class="stat-block__value">146</p>
                <p class="stat-block__label">Follower</p>
            </div>
        </div>
    </div>
</body>
</html>
