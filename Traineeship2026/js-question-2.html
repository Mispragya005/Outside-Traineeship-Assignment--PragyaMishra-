<script>
    function calculateTotal(items) {
        let total = 0;

        for (let i = 0; i < items.length; i++) {
            const price = items[i].price;
            total += items[i].price;
        }

        return total;
    }

    const cart = [
        { name: "Chair", price: 100 },
        { name: "Table", price: 200 }
    ];

    console.log(calculateTotal(cart));
</script>
