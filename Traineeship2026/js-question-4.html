<body>
<h1>Write a function to remove duplicates from an array.</h1>

<script>

    function removeDuplicates(arr) {
    return [...new Set(arr)];
   }
    const input = [1, 2, 2, 3, 4, 4, 5];
    const output = removeDuplicates(input);
    console.log(output);

    // Input:

      //  [1,2,2,3,4,4,5]

  //  Expected Output:

      //  [1,2,3,4,5] -->
</script>
</body>
