<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assessment 11</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="box">
    <div class="icon-col">
      <div class="icon danger">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <div class="tooltip">
          <div class="arrow"></div>
          <span class="message danger-text">This is DANGER...tooltip!</span>
        </div>
      </div>
    </div>

    <div class="icon-col">
      <div class="icon fine">
        <i class="fa-solid fa-fingerprint"></i>
        <div class="tooltip">
          <div class="arrow"></div>
          <span class="message fine-text">This is DANG...no no no! tooltip!</span>
        </div>
      </div>
    </div>
    
    <div class="icon-col">
      <div class="icon okay">
        <i class="fa-solid fa-cow"></i>
        <div class="tooltip">
          <div class="arrow"></div>
          <span class="message okay-text">This is COW tooltip!</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
